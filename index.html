<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Typing Speed Game - Main Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="header-bar">
        <h1 class="game-title">TYPING SPEED</h1>
        <div class="profile-container" id="profile-trigger">
            <div class="profile-circle" id="profile-avatar">G</div>
        </div>
    </div>

    <div class="profile-modal" id="profile-modal">
        <div class="modal-content">
            <h3>Edit Profile</h3>
            <div class="input-group">
                <label for="username-input">Your Name</label>
                <input type="text" id="username-input" maxlength="15" placeholder="Enter your name">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
                <button class="modal-btn save" id="modal-save">Save</button>
            </div>
        </div>
    </div>

    <main class="menu-container">
        <p class="menu-description">Test your typing speed and improve your keyboard skills.</p>

        <div class="keyboard-decoration">
            <div class="key-row">
                <div class="key highlight-qwerty">Q</div>
                <div class="key highlight-qwerty">W</div>
                <div class="key highlight-qwerty">E</div>
                <div class="key highlight-qwerty">R</div>
                <div class="key highlight-qwerty">T</div>
                <div class="key highlight-qwerty">Y</div>
                <div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
            </div>
            <div class="key-row">
                <div class="key">A</div><div class="key">S</div><div class="key">D</div>
                <div class="key">F</div><div class="key">G</div><div class="key">H</div>
                <div class="key">J</div><div class="key">K</div><div class="key">L</div>
            </div>
            <div class="key-row">
                <div class="key">Z</div><div class="key">X</div><div class="key">C</div>
                <div class="key">V</div><div class="key">B</div><div class="key">N</div><div class="key">M</div>
            </div>
            <div class="key-row">
                <a href="game.html" class="space-button-link">
                    <button class="key space-bar" id="menu-start-button">START GAME</button>
                </a>
            </div>
        </div>
    </main>

    <div class="footer-bar">
        <p>© 2026 Typing Speed Game. Ready to type.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
