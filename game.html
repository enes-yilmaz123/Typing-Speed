<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-container">
        <h1 class="game-title-text">Typing Speed Test</h1>
        <p class="game-subtitle-text">Type the text below into the box:</p>
        
        <div id="target-text">Loading words...</div>
        <br>
        
        <input id="user-input" type="text" placeholder="Start typing to begin..." autocomplete="off">
        
        <br><br>
        <p class="game-time-text">Time Left: <span id="time">60</span> seconds</p>

        <div id="stats">
            <div class="stat-box">
                <span>WPM</span>
                <strong id="wpm">0</strong>
            </div>
            <div class="stat-box">
                <span>Correct Letters</span>
                <strong id="correct-letters">0</strong>
            </div>
            <div class="stat-box">
                <span>Wrong Letters</span>
                <strong id="wrong-letters">0</strong>
            </div>
            <div class="stat-box">
                <span>Wrong Words</span>
                <strong id="wrong-words">0</strong>
            </div>
        </div>
        
    </main>

    <script src="script.js"></script>
</body>
</html>
