<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-container">
        
        <!-- Settings Menu Start -->
        <div class="settings-bar">
            <!-- 1. Menu (Language) -->
            <div class="dropdown-wrapper">
                <span class="dropdown-label" id="language-label">Language</span> <!-- ID Eklendi -->
                <div class="dropdown">
                    <button class="dropbtn" id="lang-btn" onclick="toggleMenu('language-menu')">English ▾</button>
                    <div id="language-menu" class="dropdown-content">
                        <a href="#" onclick="changeLanguage('English')">English</a>
                        <a href="#" onclick="changeLanguage('Turkish')">Turkish</a>
                    </div>
                </div>
            </div>
            <!-- 2. menu zorluk  -->
            <div class="dropdown-wrapper">
                <span class="dropdown-label" id="difficulty-label">Difficulty</span>
                <div class="dropdown">
                    <button class="dropbtn" id="diff-btn" onclick="toggleMenu('difficulty-menu')">Normal ▾</button>
                    <div id="difficulty-menu" class="dropdown-content">
                        <a href="#" id="diff-normal" onclick="changeDifficulty('Normal')">Normal</a>
                        <a href="#" id="diff-hard" onclick="changeDifficulty('Hard')">Hard</a>
                        <a href="#" id="diff-extreme" onclick="changeDifficulty('Extreme')">Extreme</a>
                    </div>
                </div>
            </div>
            
            <!-- 3. Menu (Empty) -->
            <div class="dropdown-wrapper">
                <span class="dropdown-label">&nbsp;</span>
                <div class="dropdown">
                    <button class="dropbtn" onclick="toggleMenu('menu-3')">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</button>
                    <div id="menu-3" class="dropdown-content">
                        <a href="#">Setting 1</a>
                        <a href="#">Setting 2</a>
                    </div>
                </div>
            </div>
            
            <!-- 4. Menu (Empty) -->
            <div class="dropdown-wrapper">
                <span class="dropdown-label">&nbsp;</span>
                <div class="dropdown">
                    <button class="dropbtn" onclick="toggleMenu('menu-4')">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</button>
                    <div id="menu-4" class="dropdown-content">
                        <a href="#">Setting 1</a>
                        <a href="#">Setting 2</a>
                    </div>
                </div>
            </div>
        </div>
        <!-- Settings Menu End -->

        <h1 class="game-title-text">Typing Speed Test</h1>
        <p class="game-subtitle-text">Type the text below into the box:</p>
        
        <div id="target-text">Loading words...</div>
        <br>
        
        <input id="user-input" type="text" placeholder="Start typing to begin..." autocomplete="off">
        
        <br><br>
        
        <div class="timer-box" id="timer-box">
            <span class="timer-label">TIME LEFT</span>
            <span class="timer-value"><span id="time">60</span>s</span>
        </div>

        <div id="stats">
            <div class="stat-box">
                <span>WPM</span>
                <strong id="wpm">0</strong>
            </div>
            <div class="stat-box">
                <span>Correct Letters</span>
                <strong id="correct-letters">0</strong>
            </div>
            <div class="stat-box">
                <span>Wrong Letters</span>
                <strong id="wrong-letters">0</strong>
            </div>
            <div class="stat-box">
                <span>Wrong Words</span>
                <strong id="wrong-words">0</strong>
            </div>
        </div>
        
    </main>

    <script src="script.js"></script>
</body>
</html>
