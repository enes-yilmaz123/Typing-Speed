<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <h1>Typing Speed Test</h1>
        <p>Type the text below into the box:</p>
        
        <div id="target-text">Loading words...</div>
        <br>
        
        <input id="user-input" type="text" placeholder="Start typing to begin..." autocomplete="off">
        
        <br><br>
        <p>Time Left: <span id="time">60</span> seconds</p>
        
    </center>

    <script src="script.js"></script>
</body>
</html>
