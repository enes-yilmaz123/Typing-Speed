<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <h1>Typing Speed Test</h1>
        <p>Type the text below into the box:</p>
        
        <div id="target-text">Loading words...</div>
        <br>
        
        <textarea id="user-input" rows="5" cols="50" placeholder="Click 'Start Test' to begin typing..." disabled></textarea>
        <br><br>
        
        <button id="start-button">Start Test</button>
        
        <br><br>
        <p>Time Left: <span id="time">60</span> seconds</p>
        
    </center>

    <script src="script.js"></script>
</body>
</html>
